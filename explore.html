<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Campus | Uganda Baptist Seminary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ubs-blue': '#1e3a8a',
                        'ubs-gold': '#f59e0b',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="font-sans bg-slate-50 text-slate-900" x-data="campusExplore()">

     <div class="bg-white py-4 px-6 lg:px-16 border-b border-slate-100">
        <a href="campus.html" class="text-ubs-blue hover:text-ubs-gold text-xs font-bold uppercase tracking-widest flex items-center gap-2 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back
        </a>
    </div>

    <main class="max-w-7xl mx-auto px-6 lg:px-16 py-16">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <template x-for="(location, index) in locations" :key="index">
                <a :href="location.url" class="group bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-2xl transition-all duration-500 flex flex-col">
                    
                    <div class="relative h-56 overflow-hidden">
                        <img :src="location.image" :alt="location.name" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur text-ubs-blue px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest" x-text="location.category"></div>
                        
                        <div class="absolute inset-0 bg-ubs-blue/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="bg-white text-ubs-blue px-4 py-2 rounded-full text-xs font-bold uppercase tracking-tighter">Enter Area</span>
                        </div>
                    </div>

                    <div class="p-6 flex-grow border-t border-slate-50">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-ubs-blue group-hover:text-ubs-gold transition-colors" x-text="location.name"></h3>
                            <svg class="w-5 h-5 text-slate-300 group-hover:text-ubs-gold transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </div>
                        <p class="text-slate-500 text-sm leading-relaxed" x-text="location.description"></p>
                    </div>

                    <div class="px-6 py-4 bg-slate-50/50 border-t border-slate-100 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-ubs-gold"></span>
                        <span class="text-[10px] font-bold uppercase text-slate-400 tracking-widest" x-text="location.zone"></span>
                    </div>
                </a>
            </template>

        </div>
    </main>





    <script>
        function campusExplore() {
            return {
                locations: [
                    {
                        name: "The Main Chapel",
                        url: "chapel.html",
                        category: "Spiritual",
                        zone: "South Wing",
                        image: "https://images.unsplash.com/photo-1438232992991-995b7058bbb3?q=80&w=2073&auto=format&fit=crop",
                        description: "The spiritual heart of our campus for daily worship and prayer."
                    },
                    {
                        name: "The Library",
                        url: "library.html",
                        category: "Research",
                        zone: "East Wing",
                        image: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=2073&auto=format&fit=crop",
                        description: "Extensive theological collections and quiet study spaces."
                    },
                    {
                        name: "Academic Blocks",
                        url: "academic_blocks.html",
                        category: "Education",
                        zone: "Central Zone",
                        image: "https://images.unsplash.com/photo-1523050853051-f051b0040170?q=80&w=2070&auto=format&fit=crop",
                        description: "Modern lecture halls and faculty consultation rooms."
                    },
                    {
                        name: "Dining Hall",
                        url: "dining.html",
                        category: "Community",
                        zone: "North Zone",
                        image: "https://images.unsplash.com/photo-1567521464027-f127ff144326?q=80&w=1974&auto=format&fit=crop",
                        description: "Shared meals and student fellowship areas."
                    },
                    {
                        name: "ICT Laboratory",
                        url: "ict_lab.html",
                        category: "Technology",
                        zone: "Main Hub",
                        image: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070&auto=format&fit=crop",
                        description: "Digital resources and high-speed internet for ministry research."
                    },
                    {
                        name: "Residential Halls",
                        url: "housing.html",
                        category: "Housing",
                        zone: "Residence Area",
                        image: "https://images.unsplash.com/photo-1555854817-40e07429a53c?q=80&w=2070&auto=format&fit=crop",
                        description: "Safe and comfortable accommodation for our student body."
                    }
                ]
            }
        }
    </script>
</body>
</html>
